%YAML 1.1
---
# ser2net — expone el Sonoff Dongle Max (ZigBee) como puerto TCP en la red
# Fichero: /opt/etc/ser2net.yaml  (instalado en el Asus RT-BE50 via Entware)
#
# El Sonoff Dongle Max usa el chip CP2102N (Silicon Labs).
# En AsusWRT aparece como /dev/ttyUSB0 cuando se conecta al puerto USB del router.
#
# Puerto TCP 20108: estándar de la comunidad HA para coordinadores ZigBee en red.
# Solo escucha en la red local (LAN) — no hace falta abrir este puerto en el firewall.
#
# Verificar que el dispositivo existe antes de arrancar ser2net:
#   ls /dev/ttyUSB*

connection: &sonoff_dongle
  accepter: tcp,20108
  connector: serialdev,/dev/ttyUSB0,115200n81,local
  options:
    kickolduser: true
    banner: ""
